name: cross-platform-tests

# Verifies installation and usage across Linux, macOS, and Windows, and publishes
# an Allure report (with run-over-run history) to GitHub Pages.
#
# Runs only when explicitly requested (workflow_dispatch) or when a release tag is
# pushed — not on every push, so doc/config-only changes don't trigger the heavy
# 3-OS build matrix.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  unit:
    name: unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e '.[dev]'
      - name: Run unit tests
        run: python -m pytest tests --ignore=tests/integration --ignore=tests/installer --alluredir=allure-results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-unit-${{ matrix.os }}
          path: allure-results
          if-no-files-found: ignore

  build:
    name: build+binary-tests (${{ matrix.os }})
    needs: unit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e '.[build,dev]'

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          PYTHON: python
        run: ./packaging/build.sh

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./packaging/build.ps1

      - name: Integration + installer tests
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            export OPENGENERAL_BINARY="$PWD/dist/opengeneral.exe"
          else
            export OPENGENERAL_BINARY="$PWD/dist/opengeneral"
          fi
          python -m pytest tests/integration tests/installer --alluredir=allure-results

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-binary-${{ matrix.os }}
          path: allure-results
          if-no-files-found: ignore

  service-lifecycle:
    name: service-lifecycle (${{ matrix.os }})
    needs: build
    continue-on-error: true
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e '.[build,dev]'
      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          PYTHON: python
        run: ./packaging/build.sh
      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./packaging/build.ps1
      - name: Enable systemd user session (Linux)
        if: runner.os == 'Linux'
        run: |
          loginctl enable-linger "$USER" || true
          echo "XDG_RUNTIME_DIR=/run/user/$(id -u)" >> "$GITHUB_ENV"
      - name: Real daemon lifecycle
        shell: bash
        run: |
          set -x
          if [ "$RUNNER_OS" = "Windows" ]; then
            BIN="$PWD/dist/opengeneral.exe"
          else
            BIN="$PWD/dist/opengeneral"
            chmod +x "$BIN"
          fi
          export OPENGENERAL_HOME="$RUNNER_TEMP/oghome"
          "$BIN" daemon install
          "$BIN" daemon start
          "$BIN" daemon status
          "$BIN" daemon stop
          "$BIN" daemon uninstall

  report:
    name: report
    needs: [unit, build]
    if: ${{ always() && github.repository == 'opengeneral/opengeneral' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push the site to the gh-pages branch (state store)
      pages: write      # deploy to GitHub Pages via the Actions pipeline
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          path: allure-results
          pattern: allure-results-*
          merge-multiple: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Allure 3 CLI
        run: npm install -g allure

      - name: Fetch the existing site from gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Seed history from the persisted ledger
        run: |
          if [ -f gh-pages/history.jsonl ]; then
            cp gh-pages/history.jsonl history.jsonl
          fi

      - name: Generate report
        run: allure generate allure-results

      - name: Build runs index (archive + prune + table)
        run: |
          python3 scripts/allure_runs_index.py gh-pages report site allure-results
          # Persist the cumulative trend history at the site root for the next run.
          cp history.jsonl site/history.jsonl

      # The gh-pages branch is kept purely as the persistent state store that the
      # next run reads previous archives + history from. It is NOT the Pages source
      # (that's "GitHub Actions" below), so this push triggers no Pages build.
      - name: Persist site to gh-pages (state store)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          keep_files: false

      # Serving goes through the official Actions Pages pipeline, which is reliable
      # (the legacy branch-based pages-build-deployment intermittently 401s).
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: pages-deploy
        uses: actions/deploy-pages@v4
